name: CI Frontend

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "web/**"
  pull_request:
    branches: [main]
    paths:
      - "web/**"

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/video-demo-web

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run lint
        working-directory: web

  build-and-push:
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Lowercase image name
        run: echo "IMAGE=${IMAGE_NAME,,}" >> "$GITHUB_ENV"
      - uses: docker/build-push-action@v6
        with:
          context: ./web
          push: true
          tags: ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-manifests:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: yq -i '.image.tag = "${{ github.sha }}"' deploy/web/values-web.yaml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/web/values-web.yaml
          git diff --cached --quiet && exit 0
          git commit -m "chore: update frontend image tag to ${{ github.sha }} [skip ci]"
          git push
