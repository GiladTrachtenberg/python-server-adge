name: CI Backend

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "Dockerfile"
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "Dockerfile"
      - "pyproject.toml"
      - "uv.lock"

permissions:
  contents: write
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.14
      - run: uv sync --frozen --extra dev
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/

  type-check:
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.14
      - run: uv sync --frozen --extra dev
      - run: uv run mypy src/

  test:
    needs: [type-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.14
      - run: uv sync --frozen --extra dev
      - run: uv run pytest tests/ -v --tb=short

  build-and-push:
    needs: [lint, type-check, test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/video-demo:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-manifests:
    needs: [build-and-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          yq -i '.image.tag = "${{ github.sha }}"' deploy/app/values-api.yaml
          yq -i '.image.tag = "${{ github.sha }}"' deploy/app/values-worker.yaml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/app/values-api.yaml deploy/app/values-worker.yaml
          git diff --cached --quiet && exit 0
          git commit -m "chore: update backend image tag to ${{ github.sha }} [skip ci]"
          git push
